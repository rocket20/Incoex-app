<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INCOEX | Crear cuenta</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

<style>

  *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#101415;
overflow:hidden;

}

.phone{

width:390px;
height:844px;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:#101415;

}

.glow{

position:absolute;

width:550px;
height:550px;

background:#2F8EF5;

left:-120px;
top:-170px;

opacity:.18;

border-radius:50%;

filter:blur(140px);

}

.card{

position:relative;

width:100%;

padding:28px;

border-radius:34px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(35px);

border:1px solid rgba(255,255,255,.12);

box-shadow:

0 20px 60px rgba(0,0,0,.45),

inset 0 1px rgba(255,255,255,.08);

}

.logo{

text-align:center;

margin-bottom:20px;

}

.logo img{

width:160px;

margin-bottom:15px;

}

.logo h1{

color:white;

font-size:28px;

letter-spacing:3px;

}

.logo span{

color:#7DB7FF;

font-size:13px;

}

.title{

text-align:center;

color:#C7DBFF;

font-size:24px;

font-weight:700;

margin-bottom:8px;

}

.subtitle{

text-align:center;

font-size:14px;

color:#9CA3AF;

margin-bottom:25px;

}

label{

display:block;

color:#D1D5DB;

font-size:13px;

margin-bottom:8px;

font-weight:600;

}

.input{

position:relative;

margin-bottom:18px;

}

.input i{

position:absolute;

left:16px;

top:17px;

color:#7E8794;

}

.input input{

width:100%;

padding:15px 18px 15px 45px;

background:rgba(0,0,0,.22);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

color:white;

outline:none;

transition:.3s;

}

.input input:focus{

border-color:#2F8EF5;

box-shadow:0 0 18px rgba(47,142,245,.35);

}

button{

width:100%;

padding:15px;

margin-top:12px;

border:none;

border-radius:999px;

background:linear-gradient(180deg,#2F8EF5,#1669DA);

color:white;

font-size:15px;

font-weight:700;

cursor:pointer;

transition:.3s;

box-shadow:0 10px 25px rgba(47,142,245,.35);

}

button:hover{

transform:translateY(-2px);

}

.footer{

margin-top:20px;

text-align:center;

font-size:14px;

color:#9CA3AF;

}

.footer a{

color:#8EC3FF;

text-decoration:none;

font-weight:600;

}

  </style>

</head>

<body>

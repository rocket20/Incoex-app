<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - INCOEX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #111315;
            --bg-card: #17191c;
            --bg-input: #1a1d21;
            --border-color: #2e333b;
            --text-primary: #ffffff;
            --text-secondary: #9ba1a6;
            --text-muted: #6b7280;
            --primary-blue: #3b82f6;
            --title-blue: #a5b4fc;
            --btn-login-bg: #223348;
            --btn-login-hover: #1a2738;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* Logo */
        .logo-container {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .logo-text span {
            font-size: 0.6rem;
            font-weight: 400;
            color: var(--text-secondary);
            text-align: right;
            margin-top: 2px;
        }

        .logo-x {
            color: #38bdf8;
            font-size: 2rem;
            font-weight: bold;
            font-style: italic;
        }

        /* Tarjeta principal */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .card-header h1 {
            color: var(--title-blue);
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .card-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Formularios */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #d1d5db;
        }

        .forgot-link {
            font-size: 0.75rem;
            color: var(--title-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 0.9rem 1rem;
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--title-blue);
        }

        .input-wrapper i.left-icon {
            color: var(--text-secondary);
            margin-right: 12px;
            font-size: 1rem;
        }

        .input-wrapper input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            width: 100%;
            outline: none;
            font-size: 0.9rem;
            flex: 1;
        }

        .input-wrapper input::placeholder {
            color: #525863;
        }

        .toggle-password {
            color: var(--text-secondary);
            cursor: pointer;
            margin-left: 10px;
            font-size: 1rem;
            transition: color 0.3s;
        }
        
        .toggle-password:hover {
            color: var(--text-primary);
        }

        /* Checkbox Recordarme */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .checkbox-group input[type="checkbox"] {
            appearance: none;
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            cursor: pointer;
            position: relative;
        }

        .checkbox-group input[type="checkbox"]:checked {
            background-color: var(--border-color);
        }

        .checkbox-group label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* Botón Iniciar Sesión */
        .submit-btn {
            background-color: var(--btn-login-bg);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 1rem;
            width: 100%;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .submit-btn:hover {
            background-color: var(--btn-login-hover);
        }

        /* Divisor */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2rem 0;
            color: var(--text-muted);
            font-size: 0.7rem;
            letter-spacing: 0.05em;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider::before { margin-right: 1em; }
        .divider::after { margin-left: 1em; }

        /* Botones Sociales */
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .social-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .social-btn:hover {
            background-color: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        .social-btn img {
            width: 16px;
        }
        
        .social-btn i {
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        /* Enlace de registro */
        .register-link {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .register-link a {
            color: var(--title-blue);
            text-decoration: none;
            font-weight: 500;
        }

        /* Footer */
        .footer-text {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            max-width: 300px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <span class="logo-x">X</span>
        <div class="logo-text">
            INCOEX
            <span>Logistics</span>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h1>Bienvenido</h1>
            <p>Accede a tu panel de control</p>
        </div>

        <form action="#">
            <div class="form-group">
                <div class="label-row">
                    <label>Correo electrónico</label>
                </div>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope left-icon"></i>
                    <input type="email" placeholder="nombre@incoex.com" required>
                </div>
            </div>

            <div class="form-group">
                <div class="label-row">
                    <label>Contraseña</label>
                    <a href="#" class="forgot-link">¿Olvidó su contraseña?</a>
                </div>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock left-icon"></i>
                    <input type="password" id="password-input" placeholder="••••••••••••" required>
                    <i class="fa-solid fa-eye-slash toggle-password" id="toggle-password-btn"></i>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="remember">
                <label for="remember">Recordarme</label>
            </div>

            <button type="submit" class="submit-btn">
                Iniciar Sesión
            </button>
        </form>

        <div class="divider">O CONTINUAR CON</div>

        <div class="social-login">
            <button class="social-btn" type="button">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
                Google
            </button>
            <button class="social-btn" type="button">
                <i class="fa-brands fa-apple"></i>
                Apple
            </button>
        </div>

        <div class="register-link">
            ¿No tienes una cuenta? <a href="index.html">Crear Cuenta</a>
        </div>
    </div>

    <div class="footer-text">
        © 2026 INCOEX Logistics. Todos los derechos reservados.
    </div>

    <!-- Script para alternar la visibilidad de la contraseña -->
    <script>
        const togglePasswordBtn = document.getElementById('toggle-password-btn');
        const passwordInput = document.getElementById('password-input');

        togglePasswordBtn.addEventListener('click', function () {
            // Alternar el tipo de input
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Alternar el icono
            this.classList.toggle('fa-eye-slash');
            this.classList.toggle('fa-eye');
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INCOEX | Iniciar sesión</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

<style>

  *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

display:flex;

justify-content:center;

align-items:center;

height:100vh;

background:#101415;

overflow:hidden;

}

.phone{

width:390px;

height:844px;

background:#101415;

position:relative;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

padding:22px;

}

.glow{

position:absolute;

width:520px;

height:520px;

left:-120px;

top:-180px;

background:#2F8EF5;

opacity:.20;

border-radius:50%;

filter:blur(140px);

}

.card{

position:relative;

width:100%;

padding:30px;

border-radius:34px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(35px);

border:1px solid rgba(255,255,255,.10);

box-shadow:

0 20px 60px rgba(0,0,0,.45),

inset 0 1px rgba(255,255,255,.08);

}

.logo{

display:flex;

flex-direction:column;

align-items:center;

margin-bottom:30px;

}

.logo h1{

color:white;

font-size:30px;

letter-spacing:3px;

font-weight:700;

}

.logo span{

color:#78B8FF;

font-size:13px;

}

h2{

color:#BFD8FF;

font-size:24px;

text-align:center;

margin-bottom:8px;

}

.subtitle{

text-align:center;

color:#9CA3AF;

font-size:14px;

margin-bottom:28px;

}

label{

display:block;

margin-bottom:8px;

color:#D6D6D6;

font-size:13px;

font-weight:600;

}

.input{

position:relative;

margin-bottom:20px;

}

.input i{

position:absolute;

left:16px;

top:17px;

color:#7E8794;

}

.input input{

width:100%;

padding:15px 18px 15px 45px;

border:none;

outline:none;

border-radius:18px;

background:rgba(0,0,0,.25);

color:white;

font-size:15px;

border:1px solid rgba(255,255,255,.08);

transition:.3s;

}

.input input:focus{

border-color:#2F8EF5;

box-shadow:0 0 20px rgba(47,142,245,.30);

}

.options{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

font-size:13px;

}

.options a{

color:#89BEFF;

text-decoration:none;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:999px;

background:linear-gradient(180deg,#2F8EF5,#1567D8);

color:white;

font-weight:700;

font-size:15px;

cursor:pointer;

transition:.3s;

box-shadow:0 10px 25px rgba(47,142,245,.35);

}

button:hover{

transform:translateY(-2px);

}

.footer{

margin-top:30px;

text-align:center;

color:#9CA3AF;

font-size:14px;

}

.footer a{

color:#89BEFF;

text-decoration:none;

font-weight:600;

}

  </style>

</head>

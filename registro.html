<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea tu cuenta - INCOEX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #111315;
            --bg-card: #17191c;
            --bg-input: #1e2126;
            --border-color: #2e333b;
            --text-primary: #ffffff;
            --text-secondary: #9ba1a6;
            --text-muted: #6b7280;
            --primary-blue: #3b82f6;
            --primary-blue-hover: #2563eb;
            --label-color: #a5b4fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* Logo Area */
        .logo-container {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-container img {
            height: 35px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .logo-text span {
            font-size: 0.6rem;
            font-weight: 400;
            color: var(--text-secondary);
            text-align: right;
            margin-top: 2px;
        }

        .logo-x {
            color: #38bdf8;
            font-size: 2rem;
            font-weight: bold;
            font-style: italic;
        }

        /* Card Container */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-header {
            margin-bottom: 2rem;
        }

        .card-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .card-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Form Inputs */
        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .input-group label {
            position: absolute;
            top: -7px;
            left: 15px;
            background-color: var(--bg-card);
            padding: 0 5px;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--label-color);
            letter-spacing: 0.05em;
            z-index: 1;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary-blue);
        }

        .input-wrapper i {
            color: var(--text-secondary);
            margin-right: 10px;
            font-size: 1.1rem;
        }

        .input-wrapper input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }

        .input-wrapper input::placeholder {
            color: #525863;
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .checkbox-group input[type="checkbox"] {
            appearance: none;
            background-color: transparent;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin-top: 2px;
            position: relative;
            flex-shrink: 0;
        }

        .checkbox-group input[type="checkbox"]:checked {
            background-color: var(--primary-blue);
            border-color: var(--primary-blue);
        }

        .checkbox-group label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
            cursor: pointer;
        }

        .checkbox-group label a {
            color: var(--label-color);
            text-decoration: none;
            font-weight: 500;
        }

        /* Submit Button */
        .submit-btn {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 1rem;
            width: 100%;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background-color 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .submit-btn:hover {
            background-color: var(--primary-blue-hover);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2rem 0;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider::before { margin-right: 1em; }
        .divider::after { margin-left: 1em; }

        /* Social Login */
        .social-login {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-btn {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-primary);
            font-size: 1.2rem;
        }

        .social-btn:hover {
            background-color: var(--border-color);
        }
        
        .social-btn.blue-icon {
            color: var(--primary-blue);
        }

        /* Login Link */
        .login-link {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .login-link a {
            color: var(--label-color);
            text-decoration: none;
            font-weight: 500;
        }

        /* Footer Info */
        .footer-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 420px;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .footer-links {
            display: flex;
            gap: 1rem;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- Logo placeholder -->
    <div class="logo-container">
        <span class="logo-x">X</span>
        <div class="logo-text">
            INCOEX
            <span>Logistics</span>
        </div>
    </div>

    <!-- Main Card -->
    <div class="card">
        <div class="card-header">
            <h1>Crea tu cuenta</h1>
            <p>Únete a la red logística global de INCOEX.</p>
        </div>

        <form action="#">
            <div class="input-group">
                <label>NOMBRE COMPLETO</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" placeholder="Juan Pérez" required>
                </div>
            </div>

            <div class="input-group">
                <label>EMPRESA</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-building"></i>
                    <input type="text" placeholder="Logistics Corp S.A.">
                </div>
            </div>

            <div class="input-group">
                <label>CORREO ELECTRÓNICO</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" placeholder="ejemplo@gmail.com" required>
                </div>
            </div>

            <div class="input-group">
                <label>TELÉFONO</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" placeholder="+34 000 000 000">
                </div>
            </div>

            <div class="input-group">
                <label>CONTRASEÑA</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="input-group">
                <label>CONFIRMAR CONTRASEÑA</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-shield-halved"></i>
                    <input type="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">
                    Acepto los <a href="#">términos y condiciones</a> de uso y la política de privacidad de INCOEX.
                </label>
            </div>

            <button type="submit" class="submit-btn">
                Crear Cuenta <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="divider">O REGÍSTRATE CON</div>

        <div class="social-login">
            <button class="social-btn" type="button">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" width="20">
            </button>
            <button class="social-btn" type="button">
                <i class="fa-solid fa-grip"></i>
            </button>
            <button class="social-btn blue-icon" type="button">
                <i class="fa-solid fa-circle-nodes"></i>
            </button>
        </div>

        <div class="login-link">
            ¿Ya tienes una cuenta? <a href="#">Iniciar Sesión</a>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-info">
        <div><i class="fa-solid fa-lock"></i> Encriptación 256-bit</div>
        <div class="footer-links">
            <a href="#">Soporte</a>
            <a href="#">Legal</a>
        </div>
    </div>

</body>
</html>

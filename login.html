<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOEX Logistics - Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #111315;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            flex-direction: column;
            padding: 20px;
        }

        .logo-container {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            height: 40px;
            object-fit: contain;
        }

        .login-card {
            background-color: #1c1f22;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #2a2e33;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #a0bbf0;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #8b929b;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #cfd4d9;
            margin-bottom: 8px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .label-row a {
            font-size: 12px;
            color: #a0bbf0;
            text-decoration: none;
            font-weight: 500;
        }

        .label-row a:hover {
            text-decoration: underline;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.icon-left {
            position: absolute;
            left: 15px;
            color: #8b929b;
            font-size: 14px;
        }

        .input-wrapper i.icon-right {
            position: absolute;
            right: 15px;
            color: #8b929b;
            font-size: 14px;
            cursor: pointer;
        }

        .input-wrapper input {
            width: 100%;
            background-color: #151719;
            border: 1px solid transparent;
            color: #ffffff;
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            border-color: #3b4657;
        }

        .input-wrapper input::placeholder {
            color: #4a5056;
        }

        .remember-options {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-options input[type="checkbox"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid #4a5056;
            border-radius: 4px;
            background-color: transparent;
            margin-right: 10px;
            cursor: pointer;
            position: relative;
        }

        .remember-options input[type="checkbox"]:checked {
            background-color: #a0bbf0;
            border-color: #a0bbf0;
        }

        .remember-options label {
            font-size: 13px;
            color: #cfd4d9;
            cursor: pointer;
        }

        .btn-primary {
    width: 100%;
    display: block;
    text-align: center;
    text-decoration: none;
    background: linear-gradient(135deg, #273b53 0%, #1e2e42 100%);
    color: #ffffff;
    border: 1px solid #3b4d66;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.3s;
}

.btn-primary:hover {
    opacity: 0.9;
}
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #2a2e33;
        }

        .divider span {
            padding: 0 15px;
            color: #4a5056;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .social-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-social {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #1c1f22;
            border: 1px solid #2a2e33;
            color: #cfd4d9;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-social:hover {
            background-color: #2a2e33;
        }

        .register-link {
            text-align: center;
            font-size: 14px;
            color: #8b929b;
        }

        .register-link a {
            color: #a0bbf0;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .footer-copy {
            text-align: center;
            margin-top: 30px;
            font-size: 11px;
            color: #4a5056;
            max-width: 300px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://via.placeholder.com/200x50/111315/FFFFFF?text=INCOEX+Logistics" alt="INCOEX Logistics">
    </div>

    <div class="login-card">
        <div class="header">
            <h1>Bienvenido</h1>
            <p>Accede a tu panel de control</p>
        </div>

        <!-- El form NO tiene action para evitar conflictos, el boton maneja la redireccion -->
        <form onsubmit="return false;">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope icon-left"></i>
                    <input type="email" id="email" placeholder="nombre@incoex.com" required>
                </div>
            </div>

            <div class="form-group">
                <div class="label-row">
                    <label for="password">Contraseña</label>
                    <a href="#">¿Olvidó su contraseña?</a>
                </div>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock icon-left"></i>
                    <input type="password" id="password" placeholder="••••••••••••" required>
                    <i class="fa-regular fa-eye-slash icon-right" id="togglePassword"></i>
                </div>
            </div>

            <div class="remember-options">
                <input type="checkbox" id="remember">
                <label for="remember">Recordarme</label>
            </div>

            <!-- BOTON CON REDIRECCION A dashboard.html -->
         <a href="dashboard.html" class="btn-primary">
    Iniciar Sesión
</a>
        </form>

        <div class="divider">
            <span>O CONTINUAR CON</span>
        </div>

        <div class="social-buttons">
            <button class="btn-social">
                <i class="fa-brands fa-google"></i> Google
            </button>
            <button class="btn-social">
                <i class="fa-brands fa-apple"></i> Apple
            </button>
        </div>

        <!-- ENLACE DE REGISTRO A registro.html -->
        <div class="register-link">
            ¿No tienes una cuenta? <a href="registro.html">Crear Cuenta</a>
        </div>
    </div>

    <div class="footer-copy">
        © 2026 INCOEX Logistics. Todos los derechos reservados.
    </div>

    <script>
        // Toggle mostrar/ocultar contraseña
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash');
            }
        });
    </script>

</body>
</html>
